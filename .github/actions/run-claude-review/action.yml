name: "Run Claude Review"
description: "Runs the Claude Code Action for PR reviews"

inputs:
  github_token:
    description: "GitHub token"
    required: false
  claude_code_oauth_token:
    description: "Claude Code OAuth Token（mention_type が claude の場合に使用）"
    required: false
    default: ""
  codex_code_oauth_token:
    description: "Codex Code OAuth Token / API キー（mention_type が codex の場合に使用）"
    required: false
    default: ""
  codex_auth_json:
    description: "Codex 認証情報（auth.json の Base64 エンコード値）"
    required: false
    default: ""
  codex_github_token:
    description: "Codex ボットユーザー専用の GitHub トークン（Codex が gh CLI で使用）。未指定時は github_token にフォールバック"
    required: false
    default: ""
  mention_type:
    description: "メンションの種類（claude, codex, auto）。auto の場合は Claude 優先でトークンの有無によりフォールバック"
    required: false
    default: "auto"
  issue_number:
    description: "Issue/PR 番号（Codex のコメント投稿に使用）"
    required: false
    default: ""
  pr_number:
    description: "PR 番号（Codex の PR コンテキスト取得に使用）"
    required: false
    default: ""
  head_ref:
    description: "PR の head ブランチ名（Codex のブランチリンク表示に使用）"
    required: false
    default: ""
  comment_body:
    description: "トリガーとなったコメントの本文（モデル・ターン数の解決に使用）。コメントによる発火時のみ有効"
    required: false
    default: ""
  model:
    description: "Claude model (sonnet/opus/haiku)"
    required: false
    default: "opus"
  max_turns:
    description: "Max turns"
    required: false
    default: "30"
  prompt:
    description: "Review prompt"
    required: false
    default: "/review"
  allowed_bots:
    description: "Allowed bots"
    required: false
    default: "claude[bot]"

runs:
  using: "composite"
  steps:
    - name: Build normalized review prompt
      id: review_prompt
      shell: bash
      env:
        PROMPT: ${{ inputs.prompt }}
      run: |
        DEFAULT_REVIEW_PROMPT=$(cat <<'EOF'
        この PR の変更内容をレビューしてください。

        出力ルール:
        1. 主要なレビュー結果を `.codex-review-findings.json` に JSON 形式で保存する
        2. サマリーを `.codex-summary.md` に保存する
        3. `.codex-review-findings.json` は次の形式に従う
        {
          "summary": "全体サマリー",
          "findings": [
            {
              "path": "ファイルパス",
              "line": 123,
              "severity": "low|medium|high|critical",
              "title": "問題の要約",
              "evidence": "根拠",
              "suggestion": "修正案",
              "impact": "影響範囲"
            }
          ]
        }

        注記:
        - 行コメント対象は medium 以上
        - low はサマリーのみで可
        EOF
        )

        if [ -z "$PROMPT" ] || [ "$PROMPT" = "/review" ]; then
          FINAL_PROMPT="$DEFAULT_REVIEW_PROMPT"
        else
          FINAL_PROMPT=$(printf '%s\n\n---\n%s' "$PROMPT" "$DEFAULT_REVIEW_PROMPT")
        fi

        EOF_MARKER="EOF_REVIEW_PROMPT_$(date +%s%N)"
        echo "content<<${EOF_MARKER}" >> $GITHUB_OUTPUT
        echo "$FINAL_PROMPT" >> $GITHUB_OUTPUT
        echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

    - name: Resolve mention type
      id: resolve
      shell: bash
      env:
        INPUT_MENTION_TYPE: ${{ inputs.mention_type }}
        CLAUDE_TOKEN: ${{ inputs.claude_code_oauth_token }}
        CODEX_TOKEN: ${{ inputs.codex_code_oauth_token }}
        CODEX_AUTH: ${{ inputs.codex_auth_json }}
      run: |
        HAS_CLAUDE="false"
        HAS_CODEX="false"
        if [ -n "$CLAUDE_TOKEN" ]; then HAS_CLAUDE="true"; fi
        if [ -n "$CODEX_TOKEN" ] || [ -n "$CODEX_AUTH" ]; then HAS_CODEX="true"; fi
        [ -z "$INPUT_MENTION_TYPE" ] && INPUT_MENTION_TYPE="auto"

        if [ "$INPUT_MENTION_TYPE" = "claude" ]; then
          if [ "$HAS_CLAUDE" != "true" ]; then
            echo "::error::mention_type=claude が指定されましたが、claude_code_oauth_token がありません"
            exit 1
          fi
          echo "mention_type=claude" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [ "$INPUT_MENTION_TYPE" = "codex" ]; then
          if [ "$HAS_CODEX" != "true" ]; then
            echo "::error::mention_type=codex が指定されましたが、codex_code_oauth_token または codex_auth_json がありません"
            exit 1
          fi
          echo "mention_type=codex" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [ "$HAS_CLAUDE" = "true" ]; then
          echo "mention_type=claude" >> $GITHUB_OUTPUT
        elif [ "$HAS_CODEX" = "true" ]; then
          echo "mention_type=codex" >> $GITHUB_OUTPUT
        else
          echo "::error::使用可能なトークンがありません（claude_code_oauth_token または codex_code_oauth_token/codex_auth_json が必要）"
          exit 1
        fi

    - name: Resolve Claude options
      if: steps.resolve.outputs.mention_type == 'claude'
      id: opts
      uses: actions/github-script@v7
      env:
        COMMENT_BODY: ${{ inputs.comment_body }}
      with:
        script: |
          const body = process.env.COMMENT_BODY || "";
          const model =
            body.includes("[sonnet]") ? "sonnet" :
            body.includes("[opus]")   ? "opus"   :
            body.includes("[haiku]")  ? "haiku"  : "${{ inputs.model }}";
          const m = body.match(/\[(?:turns|max-turns)=(\d+)\]/);
          const maxTurns = m ? Number(m[1]) : Number("${{ inputs.max_turns }}");
          core.setOutput("model", model);
          core.setOutput("max_turns", String(maxTurns));

    - name: Run Claude Review Action
      if: steps.resolve.outputs.mention_type == 'claude'
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        prompt: "${{ steps.review_prompt.outputs.content }}"
        track_progress: true
        allowed_bots: "${{ inputs.allowed_bots }}"
        claude_args: |
          --model ${{ steps.opts.outputs.model }}
          --max-turns ${{ steps.opts.outputs.max_turns }}
          --allowedTools "Bash(gh pr list:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*)"

    - name: Publish Claude review comments
      if: steps.resolve.outputs.mention_type == 'claude' && inputs.pr_number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.codex_github_token != '' && inputs.codex_github_token || inputs.github_token }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        set -euo pipefail

        if [ ! -f .codex-review-findings.json ]; then
          echo "skip: .codex-review-findings.json not found"
          exit 0
        fi

        PR_FILES_JSON=$(gh pr view "$PR_NUMBER" --json files 2>/dev/null || echo '{"files":[]}')
        export PR_FILES_JSON

        python3 <<'PY'
        import json
        import os
        from pathlib import Path

        findings_path = Path(".codex-review-findings.json")
        output_payload = Path(".review-payload.json")
        fallback_path = Path(".review-fallback.md")
        meta_path = Path(".review-meta.env")

        summary = ""
        findings = []
        try:
            data = json.loads(findings_path.read_text(encoding="utf-8"))
            summary = str(data.get("summary", "")).strip()
            findings = data.get("findings", []) or []
        except Exception as exc:
            fallback_path.write_text(f"⚠️ Structured review parsing failed: {exc}\n", encoding="utf-8")
            meta_path.write_text("COMMENTS_COUNT=0\nFALLBACK_COUNT=1\nREVIEW_EVENT=COMMENT\n", encoding="utf-8")
            raise SystemExit(0)

        changed = set()
        try:
            files_data = json.loads(os.environ.get("PR_FILES_JSON", "{}"))
            for f in files_data.get("files", []):
                p = f.get("path")
                if p:
                    changed.add(p)
        except Exception:
            pass

        severity_rank = {"low": 0, "medium": 1, "high": 2, "critical": 3}
        comments = []
        fallback = []
        max_sev = 0

        def render_body(item):
            return "\n".join([
                f"問題: {item.get('title', '').strip()}",
                f"根拠: {item.get('evidence', '').strip()}",
                f"修正案: {item.get('suggestion', '').strip()}",
                f"影響: {item.get('impact', '').strip()}",
            ])

        for raw in findings:
            if not isinstance(raw, dict):
                continue
            sev = str(raw.get("severity", "low")).lower()
            if sev not in severity_rank:
                sev = "low"
            max_sev = max(max_sev, severity_rank[sev])
            path = str(raw.get("path", "")).strip()
            line = raw.get("line")
            body = render_body(raw)

            if sev == "low":
                continue
            if not path or path not in changed:
                fallback.append(f"- [fallback:invalid_path] `{path}:{line}`\n{body}")
                continue
            if not isinstance(line, int) or line <= 0:
                fallback.append(f"- [fallback:invalid_line] `{path}:{line}`\n{body}")
                continue

            comments.append({
                "path": path,
                "line": line,
                "side": "RIGHT",
                "body": body[:65000],
            })

        if max_sev >= severity_rank["high"]:
            review_event = "REQUEST_CHANGES"
        elif max_sev <= severity_rank["low"] and not fallback:
            review_event = "APPROVE"
        else:
            review_event = "COMMENT"
        payload = {
            "event": review_event,
            "body": summary or "AI review findings",
            "comments": comments,
        }
        output_payload.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")

        if fallback:
            base = "⚠️ 一部の指摘は行コメントにできなかったため conversation にフォールバックしました。\n\n"
            fallback_path.write_text(base + "\n".join(fallback), encoding="utf-8")
        else:
            fallback_path.write_text("", encoding="utf-8")

        meta_path.write_text(
            f"COMMENTS_COUNT={len(comments)}\nFALLBACK_COUNT={len(fallback)}\nREVIEW_EVENT={review_event}\n",
            encoding="utf-8"
        )
        PY

        source .review-meta.env

        if ! gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" -X POST --input .review-payload.json >/dev/null 2>.review-post.err; then
          ERR_MSG=$(tr '\n' ' ' < .review-post.err | sed 's/[[:space:]]\+/ /g')
          {
            echo "⚠️ review API 投稿に失敗したため conversation にフォールバックしました。"
            echo
            echo "reason: api_error"
            echo "detail: ${ERR_MSG}"
            echo
            cat .review-fallback.md 2>/dev/null || true
          } > .review-fallback-all.md
          gh pr comment "$PR_NUMBER" --body-file .review-fallback-all.md >/dev/null || true
          exit 0
        fi

        if [ "${FALLBACK_COUNT:-0}" -gt 0 ] && [ -s .review-fallback.md ]; then
          gh pr comment "$PR_NUMBER" --body-file .review-fallback.md >/dev/null || true
        fi

    - name: Build Codex review prompt
      if: steps.resolve.outputs.mention_type == 'codex'
      id: codex_prompt
      shell: bash
      env:
        PROMPT: ${{ steps.review_prompt.outputs.content }}
      run: |
        CODEX_PROMPT="$PROMPT"
        EOF_MARKER="EOF_REVIEW_$(date +%s%N)"
        echo "content<<${EOF_MARKER}" >> $GITHUB_OUTPUT
        echo "$CODEX_PROMPT" >> $GITHUB_OUTPUT
        echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

    - name: Run Codex
      if: steps.resolve.outputs.mention_type == 'codex'
      uses: ./.github/actions/run-codex
      with:
        codex_code_oauth_token: ${{ inputs.codex_code_oauth_token }}
        codex_auth_json: ${{ inputs.codex_auth_json }}
        github_token: ${{ inputs.github_token }}
        bot_github_token: ${{ inputs.codex_github_token }}
        prompt: ${{ steps.codex_prompt.outputs.content }}
        comment_body: ${{ inputs.comment_body }}
        issue_number: ""
        pr_number: ${{ inputs.pr_number }}
        head_ref: ${{ inputs.head_ref }}
        auto_commit: "false"
        fail_on_error: "true"

    - name: Publish Codex review comments
      if: steps.resolve.outputs.mention_type == 'codex' && inputs.pr_number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.codex_github_token != '' && inputs.codex_github_token || inputs.github_token }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        set -euo pipefail

        if [ ! -f .codex-review-findings.json ]; then
          echo "skip: .codex-review-findings.json not found"
          exit 0
        fi

        PR_FILES_JSON=$(gh pr view "$PR_NUMBER" --json files 2>/dev/null || echo '{"files":[]}')
        export PR_FILES_JSON

        python3 <<'PY'
        import json
        import os
        from pathlib import Path

        findings_path = Path(".codex-review-findings.json")
        output_payload = Path(".review-payload.json")
        fallback_path = Path(".review-fallback.md")
        meta_path = Path(".review-meta.env")

        summary = ""
        findings = []
        try:
            data = json.loads(findings_path.read_text(encoding="utf-8"))
            summary = str(data.get("summary", "")).strip()
            findings = data.get("findings", []) or []
        except Exception as exc:
            fallback_path.write_text(f"⚠️ Structured review parsing failed: {exc}\n", encoding="utf-8")
            meta_path.write_text("COMMENTS_COUNT=0\nFALLBACK_COUNT=1\nREVIEW_EVENT=COMMENT\n", encoding="utf-8")
            raise SystemExit(0)

        changed = set()
        try:
            files_data = json.loads(os.environ.get("PR_FILES_JSON", "{}"))
            for f in files_data.get("files", []):
                p = f.get("path")
                if p:
                    changed.add(p)
        except Exception:
            pass

        severity_rank = {"low": 0, "medium": 1, "high": 2, "critical": 3}
        comments = []
        fallback = []
        max_sev = 0

        def render_body(item):
            return "\n".join([
                f"問題: {item.get('title', '').strip()}",
                f"根拠: {item.get('evidence', '').strip()}",
                f"修正案: {item.get('suggestion', '').strip()}",
                f"影響: {item.get('impact', '').strip()}",
            ])

        for raw in findings:
            if not isinstance(raw, dict):
                continue
            sev = str(raw.get("severity", "low")).lower()
            if sev not in severity_rank:
                sev = "low"
            max_sev = max(max_sev, severity_rank[sev])
            path = str(raw.get("path", "")).strip()
            line = raw.get("line")
            body = render_body(raw)

            if sev == "low":
                continue
            if not path or path not in changed:
                fallback.append(f"- [fallback:invalid_path] `{path}:{line}`\n{body}")
                continue
            if not isinstance(line, int) or line <= 0:
                fallback.append(f"- [fallback:invalid_line] `{path}:{line}`\n{body}")
                continue

            comments.append({
                "path": path,
                "line": line,
                "side": "RIGHT",
                "body": body[:65000],
            })

        if max_sev >= severity_rank["high"]:
            review_event = "REQUEST_CHANGES"
        elif max_sev <= severity_rank["low"] and not fallback:
            review_event = "APPROVE"
        else:
            review_event = "COMMENT"
        payload = {
            "event": review_event,
            "body": summary or "AI review findings",
            "comments": comments,
        }
        output_payload.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")

        if fallback:
            base = "⚠️ 一部の指摘は行コメントにできなかったため conversation にフォールバックしました。\n\n"
            fallback_path.write_text(base + "\n".join(fallback), encoding="utf-8")
        else:
            fallback_path.write_text("", encoding="utf-8")

        meta_path.write_text(
            f"COMMENTS_COUNT={len(comments)}\nFALLBACK_COUNT={len(fallback)}\nREVIEW_EVENT={review_event}\n",
            encoding="utf-8"
        )
        PY

        source .review-meta.env

        if ! gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" -X POST --input .review-payload.json >/dev/null 2>.review-post.err; then
          ERR_MSG=$(tr '\n' ' ' < .review-post.err | sed 's/[[:space:]]\+/ /g')
          {
            echo "⚠️ review API 投稿に失敗したため conversation にフォールバックしました。"
            echo
            echo "reason: api_error"
            echo "detail: ${ERR_MSG}"
            echo
            cat .review-fallback.md 2>/dev/null || true
          } > .review-fallback-all.md
          gh pr comment "$PR_NUMBER" --body-file .review-fallback-all.md >/dev/null || true
          exit 0
        fi

        if [ "${FALLBACK_COUNT:-0}" -gt 0 ] && [ -s .review-fallback.md ]; then
          gh pr comment "$PR_NUMBER" --body-file .review-fallback.md >/dev/null || true
        fi
