name: "Run Claude Review"
description: "Runs the Claude Code Action for PR reviews"

inputs:
  github_token:
    description: "GitHub token"
    required: false
  claude_code_oauth_token:
    description: "Claude Code OAuth Token（mention_type が claude の場合に使用）"
    required: false
    default: ""
  codex_code_oauth_token:
    description: "Codex Code OAuth Token / API キー（mention_type が codex の場合に使用）"
    required: false
    default: ""
  codex_auth_json:
    description: "Codex 認証情報（auth.json の Base64 エンコード値）"
    required: false
    default: ""
  codex_github_token:
    description: "Codex ボットユーザー専用の GitHub トークン（Codex が gh CLI で使用）。未指定時は github_token にフォールバック"
    required: false
    default: ""
  allowed_review_authors:
    description: "stale review thread 自動解決の対象とする review author login の追加 allowlist（カンマ区切り）"
    required: false
    default: ""
  mention_type:
    description: "メンションの種類（claude, codex, auto）。auto の場合は Claude 優先でトークンの有無によりフォールバック"
    required: false
    default: "auto"
  issue_number:
    description: "Issue/PR 番号（Codex のコメント投稿に使用）"
    required: false
    default: ""
  pr_number:
    description: "PR 番号（Codex の PR コンテキスト取得に使用）"
    required: false
    default: ""
  trusted_actions_ref:
    description: "信頼済み action 定義を checkout する ref"
    required: false
    default: ""
  head_sha:
    description: "PR の head SHA（成果物の freshness 検証に使用）"
    required: false
    default: ""
  head_ref:
    description: "PR の head ブランチ名（Codex のブランチリンク表示に使用）"
    required: false
    default: ""
  comment_body:
    description: "トリガーとなったコメントの本文（モデル・ターン数の解決に使用）。コメントによる発火時のみ有効"
    required: false
    default: ""
  model:
    description: "Claude model (sonnet/opus/haiku)"
    required: false
    default: "opus"
  max_turns:
    description: "Max turns"
    required: false
    default: "30"
  prompt:
    description: "Review prompt"
    required: false
    default: "/review"
  allowed_bots:
    description: "Allowed bots"
    required: false
    default: "claude[bot]"

runs:
  using: "composite"
  steps:
    - name: Build normalized review prompt
      id: review_prompt
      shell: bash
      env:
        PROMPT: ${{ inputs.prompt }}
        REVIEW_RUN_ID: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}
        REVIEW_HEAD_SHA: ${{ inputs.head_sha != '' && inputs.head_sha || github.sha }}
      run: |
        DEFAULT_REVIEW_PROMPT=$(cat <<'EOF'
        この PR の変更内容をレビューしてください。

        出力ルール:
        1. 主要なレビュー結果を `.codex-review-findings.json` に JSON 形式で保存する
        2. サマリーを `.codex-summary.md` に保存する
        3. `.codex-review-findings.json` は次の形式に従う
        {
          "summary": "全体サマリー",
          "generated_by_run_id": "__REVIEW_RUN_ID__",
          "generated_for_head_sha": "__REVIEW_HEAD_SHA__",
          "findings": [
            {
              "path": "ファイルパス",
              "line": 123,
              "severity": "low|medium|high|critical",
              "is_blocking": true,
              "tracking_issue": "https://github.com/owner/repo/issues/123 or ''",
              "title": "問題の要約",
              "evidence": "根拠",
              "suggestion": "修正案",
              "impact": "影響範囲"
            }
          ]
        }

        注記:
        - 行コメント対象は medium 以上
        - low はサマリーのみで可
        - 既知のフォローアップ issue として管理済みの課題は `is_blocking: false` とし、`tracking_issue` に issue URL か issue 番号文字列を入れる
        - `is_blocking: true` にするのは、この PR を止めるべき未管理の問題だけ
        EOF
        )
        DEFAULT_REVIEW_PROMPT=${DEFAULT_REVIEW_PROMPT//__REVIEW_RUN_ID__/$REVIEW_RUN_ID}
        DEFAULT_REVIEW_PROMPT=${DEFAULT_REVIEW_PROMPT//__REVIEW_HEAD_SHA__/$REVIEW_HEAD_SHA}

        if [ -z "$PROMPT" ] || [ "$PROMPT" = "/review" ]; then
          FINAL_PROMPT="$DEFAULT_REVIEW_PROMPT"
        else
          FINAL_PROMPT=$(printf '%s\n\n---\n%s' "$PROMPT" "$DEFAULT_REVIEW_PROMPT")
        fi

        EOF_MARKER="EOF_REVIEW_PROMPT_$(date +%s%N)"
        echo "content<<${EOF_MARKER}" >> $GITHUB_OUTPUT
        echo "$FINAL_PROMPT" >> $GITHUB_OUTPUT
        echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

    - name: Remove stale review artifacts
      shell: bash
      run: |
        rm -f \
          .codex-review-findings.json \
          .codex-summary.md \
          .codex-last-message.md \
          .review-payload.json \
          .review-comments.json \
          .review-comments.ndjson \
          .review-fallback.md \
          .review-fallback-all.md \
          .review-post.err \
          .review-comment.err \
          .review-meta.env

    - name: Restore trusted nested actions
      if: inputs.trusted_actions_ref != ''
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.trusted_actions_ref }}
        fetch-depth: 0
        path: .trusted-review-base

    - name: Resolve mention type
      id: resolve
      shell: bash
      env:
        INPUT_MENTION_TYPE: ${{ inputs.mention_type }}
        CLAUDE_TOKEN: ${{ inputs.claude_code_oauth_token }}
        CODEX_TOKEN: ${{ inputs.codex_code_oauth_token }}
        CODEX_AUTH: ${{ inputs.codex_auth_json }}
      run: |
        HAS_CLAUDE="false"
        HAS_CODEX="false"
        if [ -n "$CLAUDE_TOKEN" ]; then HAS_CLAUDE="true"; fi
        if [ -n "$CODEX_TOKEN" ] || [ -n "$CODEX_AUTH" ]; then HAS_CODEX="true"; fi
        [ -z "$INPUT_MENTION_TYPE" ] && INPUT_MENTION_TYPE="auto"

        if [ "$INPUT_MENTION_TYPE" = "claude" ]; then
          if [ "$HAS_CLAUDE" != "true" ]; then
            echo "::error::mention_type=claude が指定されましたが、claude_code_oauth_token がありません"
            exit 1
          fi
          echo "mention_type=claude" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [ "$INPUT_MENTION_TYPE" = "codex" ]; then
          if [ "$HAS_CODEX" != "true" ]; then
            echo "::error::mention_type=codex が指定されましたが、codex_code_oauth_token または codex_auth_json がありません"
            exit 1
          fi
          echo "mention_type=codex" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [ "$HAS_CLAUDE" = "true" ]; then
          echo "mention_type=claude" >> $GITHUB_OUTPUT
        elif [ "$HAS_CODEX" = "true" ]; then
          echo "mention_type=codex" >> $GITHUB_OUTPUT
        else
          echo "::error::使用可能なトークンがありません（claude_code_oauth_token または codex_code_oauth_token/codex_auth_json が必要）"
          exit 1
        fi

    - name: Resolve Claude options
      if: steps.resolve.outputs.mention_type == 'claude'
      id: opts
      uses: actions/github-script@v7
      env:
        COMMENT_BODY: ${{ inputs.comment_body }}
      with:
        script: |
          const body = process.env.COMMENT_BODY || "";
          const model =
            body.includes("[sonnet]") ? "sonnet" :
            body.includes("[opus]")   ? "opus"   :
            body.includes("[haiku]")  ? "haiku"  : "${{ inputs.model }}";
          const m = body.match(/\[(?:turns|max-turns)=(\d+)\]/);
          const maxTurns = m ? Number(m[1]) : Number("${{ inputs.max_turns }}");
          core.setOutput("model", model);
          core.setOutput("max_turns", String(maxTurns));

    - name: Run Claude Review Action
      if: steps.resolve.outputs.mention_type == 'claude'
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        prompt: "${{ steps.review_prompt.outputs.content }}"
        track_progress: true
        allowed_bots: "${{ inputs.allowed_bots }}"
        claude_args: |
          --model ${{ steps.opts.outputs.model }}
          --max-turns ${{ steps.opts.outputs.max_turns }}
          --allowedTools "Bash(gh pr list:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*)"

    - name: Publish Claude review comments
      if: steps.resolve.outputs.mention_type == 'claude' && inputs.pr_number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.codex_github_token != '' && inputs.codex_github_token || inputs.github_token }}
        REVIEW_CAN_APPROVE: ${{ inputs.codex_github_token != '' && 'true' || 'false' }}
        PR_NUMBER: ${{ inputs.pr_number }}
        REVIEW_RUN_ID: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}
        REVIEW_HEAD_SHA: ${{ inputs.head_sha != '' && inputs.head_sha || github.sha }}
      run: |
        set -euo pipefail

        if [ ! -f .codex-review-findings.json ]; then
          echo "::error::.codex-review-findings.json not found"
          exit 1
        fi

        PR_FILES_JSON=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --paginate 2>/dev/null || echo '[]')
        export PR_FILES_JSON
        COMMIT_ID=$(git rev-parse HEAD)
        export COMMIT_ID
        export REVIEW_RUN_ID REVIEW_HEAD_SHA

        python3 <<'PY'
        import base64
        import json
        import os
        import re
        from pathlib import Path

        findings_path = Path(".codex-review-findings.json")
        output_payload = Path(".review-payload.json")
        comments_payload = Path(".review-comments.json")
        fallback_path = Path(".review-fallback.md")
        meta_path = Path(".review-meta.env")

        required_keys = ("path", "line", "severity", "is_blocking", "tracking_issue", "title", "evidence", "suggestion", "impact")
        try:
            data = json.loads(findings_path.read_text(encoding="utf-8"))
        except Exception as exc:
            raise SystemExit(f"Structured review parsing failed: {exc}")
        if not isinstance(data, dict):
            raise SystemExit("Structured review payload must be a JSON object")

        summary = str(data.get("summary", "")).strip()
        findings = data.get("findings")
        generated_by_run_id = str(data.get("generated_by_run_id", "")).strip()
        generated_for_head_sha = str(data.get("generated_for_head_sha", "")).strip()
        expected_run_id = os.environ["REVIEW_RUN_ID"]
        expected_head_sha = os.environ["REVIEW_HEAD_SHA"]

        if not summary:
            raise SystemExit("Structured review payload missing non-empty summary")
        if generated_by_run_id != expected_run_id:
            raise SystemExit(f"Structured review payload run mismatch: expected {expected_run_id}, got {generated_by_run_id or '<empty>'}")
        if generated_for_head_sha != expected_head_sha:
            raise SystemExit(f"Structured review payload head SHA mismatch: expected {expected_head_sha}, got {generated_for_head_sha or '<empty>'}")
        if not isinstance(findings, list):
            raise SystemExit("Structured review payload findings must be an array")

        changed = set()
        valid_right_lines = {}
        try:
            files_data = json.loads(os.environ.get("PR_FILES_JSON", "[]"))
            for f in files_data:
                p = f.get("filename")
                if p:
                    changed.add(p)
                patch = f.get("patch")
                if not p or not patch:
                    continue
                right_lines = set()
                current_new = None
                for raw_line in patch.splitlines():
                    if raw_line.startswith("@@"):
                        match = re.match(r"@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@", raw_line)
                        if not match:
                            current_new = None
                            continue
                        current_new = int(match.group(1))
                        continue
                    if current_new is None:
                        continue
                    if raw_line.startswith("\\"):
                        continue
                    if raw_line.startswith((" ", "+")):
                        right_lines.add(current_new)
                        current_new += 1
                    elif raw_line.startswith("-"):
                        continue
                    else:
                        current_new += 1
                valid_right_lines[p] = right_lines
        except Exception:
            pass

        severity_rank = {"low": 0, "medium": 1, "high": 2, "critical": 3}
        nearest_line_threshold = 3
        comments = []
        fallback = []
        max_sev = 0
        max_blocking_sev = 0

        def parse_blocking(raw_value):
            if isinstance(raw_value, bool):
                return raw_value
            if raw_value is None:
                return True
            normalized = str(raw_value).strip().lower()
            if normalized in ("true", "1", "yes"):
                return True
            if normalized in ("false", "0", "no"):
                return False
            raise SystemExit(f"Finding is_blocking must be a boolean-compatible value: {raw_value!r}")

        def validate_tracking_issue(raw_value, is_blocking):
            value = str(raw_value or "").strip()
            if is_blocking:
                return value
            if not value:
                raise SystemExit("Non-blocking finding must include tracking_issue")
            if re.fullmatch(r"#?\d+", value):
                return value
            if re.fullmatch(r"https://github\.com/[^/]+/[^/]+/issues/\d+", value):
                return value
            raise SystemExit(f"tracking_issue must be an issue number or GitHub issue URL: {raw_value!r}")

        def render_body(item):
            return "\n".join([
                f"問題: {item.get('title', '').strip()}",
                f"根拠: {item.get('evidence', '').strip()}",
                f"修正案: {item.get('suggestion', '').strip()}",
                f"影響: {item.get('impact', '').strip()}",
            ])

        def review_marker(path, requested_line, title):
            payload = {
                "path": path,
                "line": requested_line,
                "title": " ".join(str(title or "").strip().split()),
            }
            encoded = base64.b64encode(
                json.dumps(payload, ensure_ascii=False, separators=(",", ":")).encode("utf-8")
            ).decode("ascii")
            return f"<!-- codex-review-key:{encoded} -->"

        def nearest_valid_line(path, requested_line):
            valid = sorted(valid_right_lines.get(path, set()))
            if not valid:
                return None
            return min(valid, key=lambda candidate: abs(candidate - requested_line))

        for raw in findings:
            if not isinstance(raw, dict):
                raise SystemExit("Each finding must be a JSON object")
            missing = [key for key in required_keys if key not in raw]
            if missing:
                raise SystemExit(f"Finding missing required keys: {', '.join(missing)}")
            sev = str(raw.get("severity", "low")).lower()
            if sev not in severity_rank:
                raise SystemExit(f"Invalid finding severity: {sev}")
            is_blocking = parse_blocking(raw.get("is_blocking"))
            validate_tracking_issue(raw.get("tracking_issue"), is_blocking)
            max_sev = max(max_sev, severity_rank[sev])
            if is_blocking:
                max_blocking_sev = max(max_blocking_sev, severity_rank[sev])
            path = str(raw.get("path", "")).strip()
            if not path:
                raise SystemExit("Finding path must be a non-empty string")
            line_raw = raw.get("line")
            body = render_body(raw)
            for key in ("title", "evidence", "suggestion", "impact"):
                if not str(raw.get(key, "")).strip():
                    raise SystemExit(f"Finding field '{key}' must be non-empty")
            try:
                line = int(line_raw)
            except (TypeError, ValueError):
                raise SystemExit(f"Finding line must be an integer-compatible value: {line_raw!r}")
            requested_line = line

            if sev == "low":
                continue
            if path not in changed:
                raise SystemExit(f"Finding path is outside PR diff: {path}")
            if line <= 0:
                raise SystemExit(f"Finding line must be positive: {line}")
            if path in valid_right_lines and valid_right_lines[path] and line not in valid_right_lines[path]:
                nearest = nearest_valid_line(path, line)
                if nearest is not None and abs(nearest - line) <= nearest_line_threshold:
                    body = "\n".join([
                        body,
                        "",
                        f"補足: requested_line={line}, nearest_valid_line={nearest}",
                    ])
                    line = nearest
                else:
                    reason = "not_in_diff"
                    detail = f"requested_line={line}"
                    if nearest is not None:
                        reason = "not_in_diff_out_of_range"
                        detail = f"requested_line={line}, nearest_valid_line={nearest}"
                    fallback.append(f"- [fallback:{reason}] `{path}:{line}`\n{detail}\n{body}")
                    continue

            comments.append({
                "path": path,
                "line": line,
                "side": "RIGHT",
                "body": "\n".join([body, review_marker(path, requested_line, raw.get("title", ""))])[:65000],
            })

        if max_blocking_sev >= severity_rank["high"]:
            review_event = "REQUEST_CHANGES"
        elif max_sev >= severity_rank["medium"]:
            review_event = "COMMENT"
        else:
            review_event = "APPROVE"
        payload = {
            "event": review_event,
            "body": summary or "AI review findings",
        }
        output_payload.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
        comments_payload.write_text(json.dumps(comments, ensure_ascii=False), encoding="utf-8")

        if fallback:
            base = "⚠️ 一部の指摘は行コメントにできなかったため conversation にフォールバックしました。\n\n"
            fallback_path.write_text(base + "\n".join(fallback), encoding="utf-8")
        else:
            fallback_path.write_text("", encoding="utf-8")

        meta_path.write_text(
            f"COMMENTS_COUNT={len(comments)}\nFALLBACK_COUNT={len(fallback)}\nREVIEW_EVENT={review_event}\n",
            encoding="utf-8"
        )
        PY

        source .review-meta.env

        if [ "$REVIEW_EVENT" = "APPROVE" ] && [ "$REVIEW_CAN_APPROVE" != "true" ]; then
          echo "::warning::codex_github_token が未設定のため APPROVE を COMMENT にフォールバックします"
          python3 <<'PY'
        import json
        from pathlib import Path

        payload_path = Path(".review-payload.json")
        payload = json.loads(payload_path.read_text(encoding="utf-8"))
        body = str(payload.get("body", "")).strip()
        note = "Note: APPROVE requires codex_github_token, so this result is posted as COMMENT."
        payload["event"] = "COMMENT"
        payload["body"] = f"{body}\n\n{note}" if body else note
        payload_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
        PY
          REVIEW_EVENT="COMMENT"
        fi

        if ! gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" -X POST --input .review-payload.json >/dev/null 2>.review-post.err; then
          ERR_MSG=$(tr '\n' ' ' < .review-post.err | sed 's/[[:space:]]\+/ /g')
          {
            echo "⚠️ review API 投稿に失敗したため conversation にフォールバックしました。"
            echo
            echo "reason: api_error"
            echo "detail: ${ERR_MSG}"
            echo
            cat .review-fallback.md 2>/dev/null || true
          } > .review-fallback-all.md
          gh pr comment "$PR_NUMBER" --body-file .review-fallback-all.md >/dev/null || true
          exit 0
        fi

        python3 <<'PY' > .review-comments.ndjson
        import base64
        import json
        from pathlib import Path

        for item in json.loads(Path(".review-comments.json").read_text(encoding="utf-8")):
            body = base64.b64encode(item["body"].encode("utf-8")).decode("ascii")
            print(f'{item["path"]}\t{item["line"]}\t{body}')
        PY

        while IFS=$'\t' read -r path line body_b64; do
          [ -z "$path" ] && continue
          body=$(printf '%s' "$body_b64" | base64 -d)
          if ! gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/comments" \
            -X POST \
            -f body="$body" \
            -f commit_id="$COMMIT_ID" \
            -f path="$path" \
            -F line="$line" \
            -f side="RIGHT" >/dev/null 2>.review-comment.err; then
            ERR_MSG=$(tr '\n' ' ' < .review-comment.err | sed 's/[[:space:]]\+/ /g')
            printf '%s\n%s\n\n' "- [fallback:api_error] \`$path:$line\`" "$ERR_MSG" >> .review-fallback.md
          fi
        done < .review-comments.ndjson

        if [ -s .review-fallback.md ]; then
          gh pr comment "$PR_NUMBER" --body-file .review-fallback.md >/dev/null || true
        fi

    - name: Build Codex review prompt
      if: steps.resolve.outputs.mention_type == 'codex'
      id: codex_prompt
      shell: bash
      env:
        PROMPT: ${{ steps.review_prompt.outputs.content }}
      run: |
        CODEX_PROMPT="$PROMPT"
        EOF_MARKER="EOF_REVIEW_$(date +%s%N)"
        echo "content<<${EOF_MARKER}" >> $GITHUB_OUTPUT
        echo "$CODEX_PROMPT" >> $GITHUB_OUTPUT
        echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

    - name: Run Codex
      if: steps.resolve.outputs.mention_type == 'codex'
      uses: ./.trusted-review-base/.github/actions/run-codex
      with:
        codex_code_oauth_token: ${{ inputs.codex_code_oauth_token }}
        codex_auth_json: ${{ inputs.codex_auth_json }}
        github_token: ${{ inputs.github_token }}
        bot_github_token: ${{ inputs.codex_github_token }}
        prompt: ${{ steps.codex_prompt.outputs.content }}
        comment_body: ${{ inputs.comment_body }}
        issue_number: ""
        pr_number: ${{ inputs.pr_number }}
        head_ref: ${{ inputs.head_ref }}
        auto_commit: "false"
        fail_on_error: "true"

    - name: Publish Codex review comments
      if: steps.resolve.outputs.mention_type == 'codex' && inputs.pr_number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.codex_github_token != '' && inputs.codex_github_token || inputs.github_token }}
        REVIEW_CAN_APPROVE: ${{ inputs.codex_github_token != '' && 'true' || 'false' }}
        PR_NUMBER: ${{ inputs.pr_number }}
        REVIEW_RUN_ID: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}
        REVIEW_HEAD_SHA: ${{ inputs.head_sha != '' && inputs.head_sha || github.sha }}
      run: |
        set -euo pipefail

        if [ ! -f .codex-review-findings.json ]; then
          echo "::error::.codex-review-findings.json not found"
          exit 1
        fi

        PR_FILES_JSON=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --paginate 2>/dev/null || echo '[]')
        export PR_FILES_JSON
        COMMIT_ID=$(git rev-parse HEAD)
        export COMMIT_ID
        export REVIEW_RUN_ID REVIEW_HEAD_SHA

        python3 <<'PY'
        import base64
        import json
        import os
        import re
        from pathlib import Path

        findings_path = Path(".codex-review-findings.json")
        output_payload = Path(".review-payload.json")
        comments_payload = Path(".review-comments.json")
        fallback_path = Path(".review-fallback.md")
        meta_path = Path(".review-meta.env")

        required_keys = ("path", "line", "severity", "is_blocking", "tracking_issue", "title", "evidence", "suggestion", "impact")
        try:
            data = json.loads(findings_path.read_text(encoding="utf-8"))
        except Exception as exc:
            raise SystemExit(f"Structured review parsing failed: {exc}")
        if not isinstance(data, dict):
            raise SystemExit("Structured review payload must be a JSON object")

        summary = str(data.get("summary", "")).strip()
        findings = data.get("findings")
        generated_by_run_id = str(data.get("generated_by_run_id", "")).strip()
        generated_for_head_sha = str(data.get("generated_for_head_sha", "")).strip()
        expected_run_id = os.environ["REVIEW_RUN_ID"]
        expected_head_sha = os.environ["REVIEW_HEAD_SHA"]

        if not summary:
            raise SystemExit("Structured review payload missing non-empty summary")
        if generated_by_run_id != expected_run_id:
            raise SystemExit(f"Structured review payload run mismatch: expected {expected_run_id}, got {generated_by_run_id or '<empty>'}")
        if generated_for_head_sha != expected_head_sha:
            raise SystemExit(f"Structured review payload head SHA mismatch: expected {expected_head_sha}, got {generated_for_head_sha or '<empty>'}")
        if not isinstance(findings, list):
            raise SystemExit("Structured review payload findings must be an array")

        changed = set()
        valid_right_lines = {}
        try:
            files_data = json.loads(os.environ.get("PR_FILES_JSON", "[]"))
            for f in files_data:
                p = f.get("filename")
                if p:
                    changed.add(p)
                patch = f.get("patch")
                if not p or not patch:
                    continue
                right_lines = set()
                current_new = None
                for raw_line in patch.splitlines():
                    if raw_line.startswith("@@"):
                        match = re.match(r"@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@", raw_line)
                        if not match:
                            current_new = None
                            continue
                        current_new = int(match.group(1))
                        continue
                    if current_new is None:
                        continue
                    if raw_line.startswith("\\"):
                        continue
                    if raw_line.startswith((" ", "+")):
                        right_lines.add(current_new)
                        current_new += 1
                    elif raw_line.startswith("-"):
                        continue
                    else:
                        current_new += 1
                valid_right_lines[p] = right_lines
        except Exception:
            pass

        severity_rank = {"low": 0, "medium": 1, "high": 2, "critical": 3}
        nearest_line_threshold = 3
        comments = []
        fallback = []
        max_sev = 0
        max_blocking_sev = 0

        def parse_blocking(raw_value):
            if isinstance(raw_value, bool):
                return raw_value
            if raw_value is None:
                return True
            normalized = str(raw_value).strip().lower()
            if normalized in ("true", "1", "yes"):
                return True
            if normalized in ("false", "0", "no"):
                return False
            raise SystemExit(f"Finding is_blocking must be a boolean-compatible value: {raw_value!r}")

        def validate_tracking_issue(raw_value, is_blocking):
            value = str(raw_value or "").strip()
            if is_blocking:
                return value
            if not value:
                raise SystemExit("Non-blocking finding must include tracking_issue")
            if re.fullmatch(r"#?\d+", value):
                return value
            if re.fullmatch(r"https://github\.com/[^/]+/[^/]+/issues/\d+", value):
                return value
            raise SystemExit(f"tracking_issue must be an issue number or GitHub issue URL: {raw_value!r}")

        def render_body(item):
            return "\n".join([
                f"問題: {item.get('title', '').strip()}",
                f"根拠: {item.get('evidence', '').strip()}",
                f"修正案: {item.get('suggestion', '').strip()}",
                f"影響: {item.get('impact', '').strip()}",
            ])

        def review_marker(path, requested_line, title):
            payload = {
                "path": path,
                "line": requested_line,
                "title": " ".join(str(title or "").strip().split()),
            }
            encoded = base64.b64encode(
                json.dumps(payload, ensure_ascii=False, separators=(",", ":")).encode("utf-8")
            ).decode("ascii")
            return f"<!-- codex-review-key:{encoded} -->"

        def nearest_valid_line(path, requested_line):
            valid = sorted(valid_right_lines.get(path, set()))
            if not valid:
                return None
            return min(valid, key=lambda candidate: abs(candidate - requested_line))

        for raw in findings:
            if not isinstance(raw, dict):
                raise SystemExit("Each finding must be a JSON object")
            missing = [key for key in required_keys if key not in raw]
            if missing:
                raise SystemExit(f"Finding missing required keys: {', '.join(missing)}")
            sev = str(raw.get("severity", "low")).lower()
            if sev not in severity_rank:
                raise SystemExit(f"Invalid finding severity: {sev}")
            is_blocking = parse_blocking(raw.get("is_blocking"))
            validate_tracking_issue(raw.get("tracking_issue"), is_blocking)
            max_sev = max(max_sev, severity_rank[sev])
            if is_blocking:
                max_blocking_sev = max(max_blocking_sev, severity_rank[sev])
            path = str(raw.get("path", "")).strip()
            if not path:
                raise SystemExit("Finding path must be a non-empty string")
            line_raw = raw.get("line")
            body = render_body(raw)
            for key in ("title", "evidence", "suggestion", "impact"):
                if not str(raw.get(key, "")).strip():
                    raise SystemExit(f"Finding field '{key}' must be non-empty")
            try:
                line = int(line_raw)
            except (TypeError, ValueError):
                raise SystemExit(f"Finding line must be an integer-compatible value: {line_raw!r}")
            requested_line = line

            if sev == "low":
                continue
            if path not in changed:
                raise SystemExit(f"Finding path is outside PR diff: {path}")
            if line <= 0:
                raise SystemExit(f"Finding line must be positive: {line}")
            if path in valid_right_lines and valid_right_lines[path] and line not in valid_right_lines[path]:
                nearest = nearest_valid_line(path, line)
                if nearest is not None and abs(nearest - line) <= nearest_line_threshold:
                    body = "\n".join([
                        body,
                        "",
                        f"補足: requested_line={line}, nearest_valid_line={nearest}",
                    ])
                    line = nearest
                else:
                    reason = "not_in_diff"
                    detail = f"requested_line={line}"
                    if nearest is not None:
                        reason = "not_in_diff_out_of_range"
                        detail = f"requested_line={line}, nearest_valid_line={nearest}"
                    fallback.append(f"- [fallback:{reason}] `{path}:{line}`\n{detail}\n{body}")
                    continue

            comments.append({
                "path": path,
                "line": line,
                "side": "RIGHT",
                "body": "\n".join([body, review_marker(path, requested_line, raw.get("title", ""))])[:65000],
            })

        if max_blocking_sev >= severity_rank["high"]:
            review_event = "REQUEST_CHANGES"
        elif max_sev >= severity_rank["medium"]:
            review_event = "COMMENT"
        else:
            review_event = "APPROVE"
        payload = {
            "event": review_event,
            "body": summary or "AI review findings",
        }
        output_payload.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
        comments_payload.write_text(json.dumps(comments, ensure_ascii=False), encoding="utf-8")

        if fallback:
            base = "⚠️ 一部の指摘は行コメントにできなかったため conversation にフォールバックしました。\n\n"
            fallback_path.write_text(base + "\n".join(fallback), encoding="utf-8")
        else:
            fallback_path.write_text("", encoding="utf-8")

        meta_path.write_text(
            f"COMMENTS_COUNT={len(comments)}\nFALLBACK_COUNT={len(fallback)}\nREVIEW_EVENT={review_event}\n",
            encoding="utf-8"
        )
        PY

        source .review-meta.env

        if [ "$REVIEW_EVENT" = "APPROVE" ] && [ "$REVIEW_CAN_APPROVE" != "true" ]; then
          echo "::warning::codex_github_token が未設定のため APPROVE を COMMENT にフォールバックします"
          python3 <<'PY'
        import json
        from pathlib import Path

        payload_path = Path(".review-payload.json")
        payload = json.loads(payload_path.read_text(encoding="utf-8"))
        body = str(payload.get("body", "")).strip()
        note = "Note: APPROVE requires codex_github_token, so this result is posted as COMMENT."
        payload["event"] = "COMMENT"
        payload["body"] = f"{body}\n\n{note}" if body else note
        payload_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
        PY
          REVIEW_EVENT="COMMENT"
        fi

        if ! gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" -X POST --input .review-payload.json >/dev/null 2>.review-post.err; then
          ERR_MSG=$(tr '\n' ' ' < .review-post.err | sed 's/[[:space:]]\+/ /g')
          {
            echo "⚠️ review API 投稿に失敗したため conversation にフォールバックしました。"
            echo
            echo "reason: api_error"
            echo "detail: ${ERR_MSG}"
            echo
            cat .review-fallback.md 2>/dev/null || true
          } > .review-fallback-all.md
          gh pr comment "$PR_NUMBER" --body-file .review-fallback-all.md >/dev/null || true
          exit 0
        fi

        python3 <<'PY' > .review-comments.ndjson
        import base64
        import json
        from pathlib import Path

        for item in json.loads(Path(".review-comments.json").read_text(encoding="utf-8")):
            body = base64.b64encode(item["body"].encode("utf-8")).decode("ascii")
            print(f'{item["path"]}\t{item["line"]}\t{body}')
        PY

        while IFS=$'\t' read -r path line body_b64; do
          [ -z "$path" ] && continue
          body=$(printf '%s' "$body_b64" | base64 -d)
          if ! gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/comments" \
            -X POST \
            -f body="$body" \
            -f commit_id="$COMMIT_ID" \
            -f path="$path" \
            -F line="$line" \
            -f side="RIGHT" >/dev/null 2>.review-comment.err; then
            ERR_MSG=$(tr '\n' ' ' < .review-comment.err | sed 's/[[:space:]]\+/ /g')
            printf '%s\n%s\n\n' "- [fallback:api_error] \`$path:$line\`" "$ERR_MSG" >> .review-fallback.md
          fi
        done < .review-comments.ndjson

        if [ -s .review-fallback.md ]; then
          gh pr comment "$PR_NUMBER" --body-file .review-fallback.md >/dev/null || true
        fi

    - name: Resolve obsolete review threads
      if: inputs.pr_number != '' && inputs.codex_github_token != '' && (steps.resolve.outputs.mention_type == 'claude' || steps.resolve.outputs.mention_type == 'codex')
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.codex_github_token }}
        PR_NUMBER: ${{ inputs.pr_number }}
        REVIEW_RUN_ID: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}
        REVIEW_HEAD_SHA: ${{ inputs.head_sha != '' && inputs.head_sha || github.sha }}
        EXTRA_REVIEW_AUTHORS: ${{ inputs.allowed_review_authors }}
      run: |
        set -euo pipefail

        if [ ! -f .codex-review-findings.json ]; then
          echo "skip: no structured findings to compare for thread resolution"
          exit 0
        fi

        REPO_OWNER="${GITHUB_REPOSITORY%/*}"
        REPO_NAME="${GITHUB_REPOSITORY#*/}"
        REVIEW_AUTHOR_LOGINS="github-actions[bot]"
        export REPO_OWNER REPO_NAME

        if [ -n "${EXTRA_REVIEW_AUTHORS:-}" ]; then
          REVIEW_AUTHOR_LOGINS="${REVIEW_AUTHOR_LOGINS},${EXTRA_REVIEW_AUTHORS}"
        fi

        if BOT_LOGIN=$(gh api user --jq .login 2>/dev/null); then
          if [ -n "$BOT_LOGIN" ] && [ "$BOT_LOGIN" != "null" ]; then
            REVIEW_AUTHOR_LOGINS="${REVIEW_AUTHOR_LOGINS},${BOT_LOGIN}"
          fi
        fi

        export REVIEW_AUTHOR_LOGINS

        if ! python3 <<'PY'
        import json
        import os
        import subprocess
        from pathlib import Path

        owner = os.environ["REPO_OWNER"]
        name = os.environ["REPO_NAME"]
        number = os.environ["PR_NUMBER"]
        query = """
        query($owner:String!, $name:String!, $number:Int!, $after:String) {
          repository(owner:$owner, name:$name) {
            pullRequest(number:$number) {
              reviewThreads(first:100, after:$after) {
                nodes {
                  id
                  isResolved
                  comments(first:10) {
                    nodes {
                      author { login }
                      path
                      originalLine
                      body
                    }
                  }
                }
                pageInfo {
                  hasNextPage
                  endCursor
                }
              }
            }
          }
        }
        """

        nodes = []
        cursor = None
        while True:
          cmd = [
              "gh", "api", "graphql",
              "-F", f"owner={owner}",
              "-F", f"name={name}",
              "-F", f"number={number}",
              "-f", f"query={query}",
          ]
          if cursor:
              cmd.extend(["-F", f"after={cursor}"])
          result = subprocess.run(cmd, check=True, capture_output=True, text=True)
          payload = json.loads(result.stdout)
          connection = (((payload.get("data") or {}).get("repository") or {}).get("pullRequest") or {}).get("reviewThreads") or {}
          nodes.extend(connection.get("nodes") or [])
          page_info = connection.get("pageInfo") or {}
          if not page_info.get("hasNextPage"):
              break
          cursor = page_info.get("endCursor")
          if not cursor:
              break

        Path(".review-threads.json").write_text(
            json.dumps({"nodes": nodes}, ensure_ascii=False),
            encoding="utf-8",
        )
        PY
        then
          echo "::warning::reviewThreads の取得に失敗したため stale review thread の自動解決をスキップしました"
          exit 0
        fi

        if ! python3 <<'PY' > .review-thread-ids.txt
        import base64
        import json
        import os
        import re
        from pathlib import Path

        def normalize(text):
            return " ".join(str(text or "").strip().split())

        def title_from_body(body):
            for line in str(body or "").splitlines():
                line = line.strip()
                if line.startswith("問題:"):
                    return normalize(line.split(":", 1)[1])
            return ""

        def requested_line_from_body(body, fallback_line):
            match = re.search(r"requested_line=(\d+)", str(body or ""))
            if match:
                return int(match.group(1))
            return fallback_line

        def marker_from_body(body):
            match = re.search(r"<!--\s*codex-review-key:([A-Za-z0-9+/=]+)\s*-->", str(body or ""))
            if not match:
                return None
            try:
                payload = json.loads(base64.b64decode(match.group(1)).decode("utf-8"))
            except Exception:
                return None
            path = str(payload.get("path", "")).strip()
            title = normalize(payload.get("title", ""))
            try:
                line = int(payload.get("line"))
            except (TypeError, ValueError):
                return None
            if not path or not title or line <= 0:
                return None
            return (path, line, title)

        findings_payload = json.loads(Path(".codex-review-findings.json").read_text(encoding="utf-8"))
        threads_data = json.loads(Path(".review-threads.json").read_text(encoding="utf-8"))
        expected_run_id = os.environ["REVIEW_RUN_ID"]
        expected_head_sha = os.environ["REVIEW_HEAD_SHA"]
        allowed_authors = {
            normalize(login)
            for login in os.environ.get("REVIEW_AUTHOR_LOGINS", "").split(",")
            if normalize(login)
        }

        if not isinstance(findings_payload, dict):
            raise SystemExit("Structured review payload must be a JSON object for stale thread resolution")

        generated_by_run_id = str(findings_payload.get("generated_by_run_id", "")).strip()
        generated_for_head_sha = str(findings_payload.get("generated_for_head_sha", "")).strip()
        if generated_by_run_id != expected_run_id:
            raise SystemExit(
                f"Structured review payload run mismatch during stale thread resolution: "
                f"expected {expected_run_id}, got {generated_by_run_id or '<empty>'}"
            )
        if generated_for_head_sha != expected_head_sha:
            raise SystemExit(
                f"Structured review payload head SHA mismatch during stale thread resolution: "
                f"expected {expected_head_sha}, got {generated_for_head_sha or '<empty>'}"
            )

        active = set()
        for item in findings_payload.get("findings", []) or []:
            if not isinstance(item, dict):
                continue
            if str(item.get("severity", "")).lower() == "low":
                continue
            path = str(item.get("path", "")).strip()
            title = normalize(item.get("title", ""))
            try:
                line = int(item.get("line"))
            except (TypeError, ValueError):
                continue
            if path and title and line > 0:
                active.add((path, line, title))

        nodes = threads_data.get("nodes") or []
        for node in nodes:
            if node.get("isResolved"):
                continue
            comments = ((node.get("comments") or {}).get("nodes") or [])
            if not comments:
                continue
            first = comments[0]
            author = normalize(((first.get("author") or {}).get("login")) or "")
            if author not in allowed_authors:
                continue
            marker = marker_from_body(first.get("body", ""))
            if marker is not None:
                candidate = marker
            else:
                path = str(first.get("path", "")).strip()
                line = first.get("originalLine")
                title = title_from_body(first.get("body", ""))
                try:
                    line = int(line)
                except (TypeError, ValueError):
                    continue
                line = requested_line_from_body(first.get("body", ""), line)
                if not path or not title or line <= 0:
                    continue
                candidate = (path, line, title)
            if candidate in active:
                continue
            print(node["id"])
        PY
        then
          echo "::warning::stale review thread の照合に失敗したため自動解決をスキップしました"
          exit 0
        fi

        while IFS= read -r thread_id; do
          [ -z "$thread_id" ] && continue
          if ! gh api graphql \
            -f query='mutation($id:ID!){ resolveReviewThread(input:{threadId:$id}) { thread { id isResolved } } }' \
            -F id="$thread_id" >/dev/null 2>.review-thread-resolve.err; then
            ERR_MSG=$(tr '\n' ' ' < .review-thread-resolve.err | sed 's/[[:space:]]\+/ /g')
            echo "::warning::resolveReviewThread failed for $thread_id: $ERR_MSG"
          fi
        done < .review-thread-ids.txt

    - name: Skip obsolete review thread resolution without bot token
      if: inputs.pr_number != '' && inputs.codex_github_token == '' && (steps.resolve.outputs.mention_type == 'claude' || steps.resolve.outputs.mention_type == 'codex')
      shell: bash
      run: |
        echo "::warning::codex_github_token が未設定のため stale review thread の自動解決をスキップしました"
