name: Agent Review PoC
run-name: "agent-review-poc pr #${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}"

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
      mention_type:
        description: "Review engine"
        required: false
        default: "claude"
        type: choice
        options:
          - claude
          - codex

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write
  id-token: write

concurrency:
  group: >-
    agent-review-poc-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
    -${{ github.event_name }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare context
        id: prep
        if: github.event_name != 'workflow_dispatch'
        uses: ./.github/actions/prepare-claude-context
        with:
          mode: "review"
          impl_workflow_id: agent.yml
          skip_commit_prefixes: "docs:,style:,wip:"
          allow_final_sync_during_impl: "true"
          final_sync_commit_marker: "[agent-final]"
          allowed_comment_permissions: "admin,maintain,write"
          max_workflow_runs_to_scan: "50"

      - name: Stop early if skipped
        if: github.event_name != 'workflow_dispatch' && steps.prep.outputs.should_run != 'true'
        run: |
          echo "Skipping review: ${{ steps.prep.outputs.reason }}"

      - name: Resolve manual review context
        id: manual
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MENTION_TYPE: ${{ inputs.mention_type }}
        run: |
          set -euo pipefail

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid')
          HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --json number --jq '.number')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "mention_type=$MENTION_TYPE" >> "$GITHUB_OUTPUT"

      - name: Fail fast if PR context missing
        if: |
          (github.event_name != 'workflow_dispatch' && steps.prep.outputs.should_run == 'true' && steps.prep.outputs.pr_number == '') ||
          (github.event_name == 'workflow_dispatch' && steps.manual.outputs.pr_number == '')
        run: |
          echo "PR context is required for review but pr_number is empty."
          exit 1

      - name: Checkout PR head
        if: github.event_name != 'workflow_dispatch' && steps.prep.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prep.outputs.head_sha }}
          fetch-depth: 0

      - name: Checkout manual PR head
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.manual.outputs.head_sha }}
          fetch-depth: 0

      - name: Configure git URL rewriting for fork PRs
        if: github.event_name != 'workflow_dispatch' && steps.prep.outputs.should_run == 'true' && steps.prep.outputs.fork_clone_url != ''
        env:
          FORK_URL: ${{ steps.prep.outputs.fork_clone_url }}
        run: |
          ORIGIN_URL=$(git remote get-url origin)
          ORIGIN_BASE="${ORIGIN_URL%.git}"
          FORK_BASE="${FORK_URL%.git}"
          git config url."${FORK_BASE}".insteadOf "${ORIGIN_BASE}"
          git config url."${FORK_BASE}.git".insteadOf "${ORIGIN_BASE}.git"

      - name: Run Agent Review
        if: |
          (github.event_name != 'workflow_dispatch' && steps.prep.outputs.should_run == 'true') ||
          github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/run-claude-review
        with:
          github_token: ${{ github.token }}
          comment_body: ${{ github.event_name == 'workflow_dispatch' && '@claude [review]' || steps.prep.outputs.comment_body }}
          mention_type: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.mention_type || steps.prep.outputs.mention_type }}
          issue_number: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.issue_number || steps.prep.outputs.issue_number }}
          pr_number: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.pr_number || steps.prep.outputs.pr_number }}
          head_sha: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.head_sha || steps.prep.outputs.head_sha }}
          head_ref: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.head_ref || steps.prep.outputs.head_ref }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          codex_code_oauth_token: ${{ secrets.CODEX_CODE_OAUTH_TOKEN }}
          codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
          codex_github_token: ${{ secrets.CODEX_GITHUB_TOKEN }}
          codex_app_id: ${{ vars.CODEX_APP_ID || secrets.CODEX_APP_ID }}
          codex_app_private_key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          allowed_review_authors: ${{ vars.CODEX_REVIEW_AUTHOR_LOGINS }}
          model: 'opus'
          max_turns: '30'
