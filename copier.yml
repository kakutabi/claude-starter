# Claude Starter - copier テンプレート設定
# https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: .copier-answers.yml

# 条件分岐による除外
_exclude:
  - "{% if not install_claude %}.claude{% endif %}"
  - "{% if not install_workflows %}.github/workflows{% endif %}"
  - "{% if not install_docs %}docs{% endif %}"
  - "{% if not install_scripts %}scripts{% endif %}"
  - "{% if not install_staging %}infra{% endif %}"
  - "{% if not install_staging %}.github/workflows/infra-*.yml{% endif %}"
  - "{% if not install_staging %}.github/workflows/deploy-*.yml{% endif %}"
  - "{% if not install_staging %}.github/workflows/cleanup-*.yml{% endif %}"
  - "{% if not install_staging %}functions{% endif %}"
  - "{% if not install_staging %}scripts/init-webapp.sh{% endif %}"
  - "{% if not install_staging %}docs/staging{% endif %}"
  - "copier.yml"
  - "README.md"
  - "**/*.local.json"
  - "**/.DS_Store"

# =============================================================================
# 質問定義
# =============================================================================

ref:
  type: str
  help: |
    GitHub Actions で参照するバージョンを指定してください。
    例: @master, @v1.0.0
  default: "@master"

install_claude:
  type: bool
  help: |
    .claude/ ディレクトリをインストールしますか？
    （rules/ と skills/ が含まれます）
  default: true

install_workflows:
  type: bool
  help: |
    GitHub Workflows をインストールしますか？
    （agent.yml, agent-review.yml など）
  default: true

install_docs:
  type: bool
  help: |
    docs/agent/ ディレクトリをインストールしますか？
    （TASK.md, PR.md, PLAN_PROMPT.md, BREAKDOWN_PROMPT.md）
  default: true

install_scripts:
  type: bool
  help: |
    scripts/ ディレクトリをインストールしますか？
    （sync_templates.py）
  default: true

install_staging:
  type: bool
  help: |
    Staging/Preview 環境をセットアップしますか？
    （Cloudflare Pages へのデプロイ、preview 環境の自動構築）
  default: false

# =============================================================================
# Cloudflare 設定（Staging 有効時のみ）
# =============================================================================

cloudflare_project_name:
  type: str
  help: |
    Cloudflare Pages のプロジェクト名を入力してください。
  when: "{{ install_staging }}"
  validator: "{% if not cloudflare_project_name %}プロジェクト名は必須です{% endif %}"

cloudflare_account_id:
  type: str
  help: |
    Cloudflare のアカウント ID を入力してください。
  when: "{{ install_staging }}"
  validator: "{% if not cloudflare_account_id %}アカウント ID は必須です{% endif %}"

# =============================================================================
# Claude モデル・ターン数設定
# =============================================================================

claude_model:
  type: str
  help: |
    Claude のデフォルトモデルを選択してください。
    コメントで [sonnet] / [opus] / [haiku] を指定すると上書きできます。
  default: "opus"
  choices:
    - "opus"
    - "sonnet"
    - "haiku"
  when: "{{ install_workflows }}"

implement_max_turns:
  type: int
  help: |
    実装（implement）の最大ターン数を指定してください。
  default: 1000
  when: "{{ install_workflows }}"

plan_max_turns:
  type: int
  help: |
    プラン（plan）の最大ターン数を指定してください。
  default: 50
  when: "{{ install_workflows }}"

review_max_turns:
  type: int
  help: |
    レビュー（review）の最大ターン数を指定してください。
  default: 30
  when: "{{ install_workflows }}"

breakdown_max_turns:
  type: int
  help: |
    分解（breakdown）の最大ターン数を指定してください。
  default: 100
  when: "{{ install_workflows }}"
