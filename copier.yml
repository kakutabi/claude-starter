# Claude Starter - copier テンプレート設定
# https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: .copier-answers.yml

# ユーザーがカスタマイズした可能性があるファイルは上書きしない
_skip_if_exists:
  - ".claude/rules/*"
  - "CLAUDE.md"

# 条件分岐による除外
_exclude:
  - "{% if not install_claude %}.claude{% endif %}"
  - "{% if not install_workflows %}.github/workflows{% endif %}"
  - "{% if not install_docs %}docs{% endif %}"
  - "{% if not install_scripts %}scripts{% endif %}"
  - "copier.yml"
  - "README.md"
  - "**/*.local.json"
  - "**/.DS_Store"

# =============================================================================
# 質問定義
# =============================================================================

ref:
  type: str
  help: |
    GitHub Actions で参照するバージョンを指定してください。
    例: @master, @v1.0.0
  default: "@master"

install_claude:
  type: bool
  help: |
    .claude/ ディレクトリをインストールしますか？
    （rules/ と skills/ が含まれます）
  default: true

install_workflows:
  type: bool
  help: |
    GitHub Workflows をインストールしますか？
    （claude.yml, claude-review.yml など）
  default: true

install_docs:
  type: bool
  help: |
    docs/agent/ ディレクトリをインストールしますか？
    （TASK.md, PR.md, PLAN_PROMPT.md, BREAKDOWN_PROMPT.md）
  default: true

install_scripts:
  type: bool
  help: |
    scripts/ ディレクトリをインストールしますか？
    （sync_templates.py）
  default: true

# =============================================================================
# Claude モデル・ターン数設定
# =============================================================================

claude_model:
  type: str
  help: |
    Claude のデフォルトモデルを選択してください。
    コメントで [sonnet] / [opus] / [haiku] を指定すると上書きできます。
  default: "opus"
  choices:
    - "opus"
    - "sonnet"
    - "haiku"
  when: "{{ install_workflows }}"

implement_max_turns:
  type: int
  help: |
    実装（implement）の最大ターン数を指定してください。
  default: 1000
  when: "{{ install_workflows }}"

plan_max_turns:
  type: int
  help: |
    プラン（plan）の最大ターン数を指定してください。
  default: 50
  when: "{{ install_workflows }}"

review_max_turns:
  type: int
  help: |
    レビュー（review）の最大ターン数を指定してください。
  default: 30
  when: "{{ install_workflows }}"

breakdown_max_turns:
  type: int
  help: |
    分解（breakdown）の最大ターン数を指定してください。
  default: 100
  when: "{{ install_workflows }}"

# =============================================================================
# 自動レビュー設定
# =============================================================================

auto_review_default_model:
  type: str
  help: |
    PR 自動レビュー時のデフォルトモデルを選択してください。
    コメントで [sonnet] / [opus] / [haiku] を指定すると上書きできます。
  default: "haiku"
  choices:
    - "opus"
    - "sonnet"
    - "haiku"
  when: "{{ install_workflows }}"
