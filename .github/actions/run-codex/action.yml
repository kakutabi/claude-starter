name: "Run Codex"
description: "Codex のセットアップと実行を行う共通アクション（GitHub 連携機能付き）"
# セキュリティ注記:
# - このアクションは issue_comment 等の外部トリガーで起動される場合があります
# - 呼び出し側ワークフローで author_association チェック等のアクセス制御を行ってください
# - エラーログをコメントに投稿する際は機密情報の混入に注意してください
# - 参考: https://developers.openai.com/codex/auth
#         https://docs.github.com/ja/actions/reference/security/secure-use

inputs:
  codex_code_oauth_token:
    description: "Codex Code OAuth Token / API キー"
    required: false
    default: ""
  codex_auth_json:
    description: "Codex 認証情報（auth.json の Base64 エンコード値）"
    required: false
    default: ""
  github_token:
    description: "GitHub トークン（コメント投稿・gh CLI 認証に使用）"
    required: false
    default: ""
  prompt:
    description: "Codex に渡すプロンプト"
    required: true
  comment_body:
    description: "トリガーコメントの本文（モデル・推論レベルの自動解決とトークン削除に使用）"
    required: false
    default: ""
  issue_number:
    description: "コメントを投稿する Issue/PR 番号（空の場合はコメント投稿をスキップ）"
    required: false
    default: ""
  pr_number:
    description: "PR 番号（PR コンテキストの取得に使用。空の場合は Issue コンテキスト）"
    required: false
    default: ""
  head_ref:
    description: "PR の head ブランチ名（ブランチリンク表示に使用）"
    required: false
    default: ""
  auto_commit:
    description: "Codex 実行後にコード変更を自動コミット・プッシュするか"
    required: false
    default: "true"
  fail_on_error:
    description: "Codex 実行が失敗した場合にアクション全体を失敗させるか"
    required: false
    default: "false"
  create_branch:
    description: "実行前に新しいブランチを作成するか（Issue 起点の実装で使用）"
    required: false
    default: "false"
  branch_prefix:
    description: "作成するブランチの接頭辞"
    required: false
    default: "codex/"
  default_model:
    description: "デフォルトの Codex モデル（コメント本文で指定がない場合に使用）"
    required: false
    default: "gpt-5.3-codex"
  git_user_name:
    description: "Git コミットの作成者名（GitHub App の bot ユーザー名。例: codex[bot]）"
    required: false
    default: "codex[bot]"
  bot_github_token:
    description: "ボットユーザー専用の GitHub トークン（gh CLI でのコメント投稿・Issue 作成に使用）。指定時は github_token の代わりに GH_TOKEN として使用される"
    required: false
    default: ""
  app_id:
    description: "GitHub App ID（App トークンで push すると後続ワークフローがトリガーされる）"
    required: false
    default: ""
  app_private_key:
    description: "GitHub App の秘密鍵（PEM 形式）"
    required: false
    default: ""

outputs:
  codex_response:
    description: "Codex の実行結果サマリー"
    value: ${{ steps.codex_output.outputs.response }}

runs:
  using: "composite"
  steps:
    # 1. 認証情報の検証
    - name: Validate Codex credentials
      shell: bash
      env:
        CODEX_TOKEN: ${{ inputs.codex_code_oauth_token }}
        CODEX_AUTH_JSON: ${{ inputs.codex_auth_json }}
      run: |
        if [ -z "$CODEX_TOKEN" ] && [ -z "$CODEX_AUTH_JSON" ]; then
          echo "::error::codex_code_oauth_token または codex_auth_json のいずれかが必須です"
          exit 1
        fi

    # 1.1. GitHub App トークンの生成
    # GITHUB_TOKEN で push すると後続ワークフロー（レビュー等）がトリガーされない GitHub の仕様を回避
    # https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
    - name: Generate GitHub App token
      if: inputs.app_id != '' && inputs.app_private_key != ''
      id: app_token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}

    # 1.2. GitHub トークンの可用性チェック
    # steps.app_token.outputs.token はステップ未実行時に未定義となり != '' の評価が不安定になる
    # 明示的に有効なトークンを持っているかをチェックする
    - name: Check GitHub token availability
      id: gh_token
      shell: bash
      env:
        APP_TOKEN: ${{ steps.app_token.outputs.token }}
        BOT_TOKEN: ${{ inputs.bot_github_token }}
        GITHUB_TOKEN_INPUT: ${{ inputs.github_token }}
      run: |
        TOKEN="${APP_TOKEN:-${BOT_TOKEN:-${GITHUB_TOKEN_INPUT}}}"
        if [ -n "$TOKEN" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
          echo "GitHub トークン: 利用可能"
        else
          echo "available=false" >> $GITHUB_OUTPUT
          echo "GitHub トークン: 利用不可（コメント投稿はスキップされます）"
        fi

    # 1.5. Codex オプション解決（モデルをコメント本文から自動パース）
    - name: Resolve Codex options
      id: codex_opts
      uses: actions/github-script@v7
      env:
        COMMENT_BODY: ${{ inputs.comment_body }}
        DEFAULT_MODEL: ${{ inputs.default_model }}
      with:
        script: |
          const body = process.env.COMMENT_BODY || "";
          const defaultModel = process.env.DEFAULT_MODEL || "gpt-5.3-codex";

          // 優先順位: コメント本文 > デフォルトモデル
          let model = "";
          if (body) {
            const modelMatch = body.match(/\[model=([^\]]+)\]/);
            model = modelMatch ? modelMatch[1] : "";

            if (!model) {
              const knownModels = [
                // GPT-5.x Codex 最適化モデル
                'gpt-5.3-codex', 'gpt-5.2-codex',
                'gpt-5.1-codex-max', 'gpt-5.1-codex-mini',
                // GPT-5.x 汎用モデル
                'gpt-5.4', 'gpt-5.2',
              ];
              for (const m of knownModels) {
                if (body.includes(`[${m}]`)) {
                  model = m;
                  break;
                }
              }
            }
          }

          // コメント・明示指定のいずれでも指定がなければデフォルトモデルを使用
          if (!model) {
            model = defaultModel;
          }

          core.setOutput("model", model);

    # 2. Git ユーザー設定
    # GitHub でボットのアバターを正しく表示するには <id>+<login>@users.noreply.github.com 形式が必要
    - name: Configure git user
      id: git_user
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app_token.outputs.token || inputs.bot_github_token || inputs.github_token }}
        BOT_LOGIN: ${{ inputs.git_user_name }}
      run: |
        # BOT_LOGIN のサニタイズ（GitHub ユーザー名として有効な文字のみ許可）
        # codex[bot] のような GitHub bot ユーザー名を許可
        VALID_PATTERN='^[a-zA-Z0-9._-]+(\[[a-zA-Z0-9._-]+\])?$'
        if [[ ! "$BOT_LOGIN" =~ $VALID_PATTERN ]]; then
          echo "::error::git_user_name に無効な文字が含まれています: ${BOT_LOGIN}"
          exit 1
        fi

        # GitHub API で bot ユーザーの ID を取得し、正しい noreply メールを構築
        BOT_ID=""
        if [ -n "$GH_TOKEN" ]; then
          BOT_ID=$(gh api "/users/${BOT_LOGIN}" --jq '.id' 2>/dev/null || echo "")
        fi

        if [ -n "$BOT_ID" ]; then
          GIT_EMAIL="${BOT_ID}+${BOT_LOGIN}@users.noreply.github.com"
        else
          GIT_EMAIL="${BOT_LOGIN}@users.noreply.github.com"
        fi

        git config user.name "$BOT_LOGIN"
        git config user.email "$GIT_EMAIL"

        echo "git_email=${GIT_EMAIL}" >> $GITHUB_OUTPUT
        echo "Git ユーザー設定: ${BOT_LOGIN} <${GIT_EMAIL}>"

    # 2.5. .codex/ ディレクトリの事前存在チェック
    - name: Check .codex/ directory pre-existence
      id: codex_dir
      shell: bash
      run: |
        # 実行前に .codex/ が存在するかを記録
        # tracked かどうかではなく「実行前に存在したか」で判定する
        # （gitignore で管理されているケースを誤削除しないため）
        if [ -d .codex ]; then
          echo "pre_exists=true" >> $GITHUB_OUTPUT
        else
          echo "pre_exists=false" >> $GITHUB_OUTPUT
        fi

    # 3. PR/Issue コンテキストの収集 + プロンプト拡充
    - name: Collect context
      id: context
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app_token.outputs.token || inputs.bot_github_token || inputs.github_token }}
        GH_REPO: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr_number }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        ORIGINAL_PROMPT: ${{ inputs.prompt }}
        AUTO_COMMIT: ${{ inputs.auto_commit }}
      run: |
        CONTEXT=""

        # PR コンテキストの取得
        if [ -n "$PR_NUMBER" ] && [ -n "$GH_TOKEN" ]; then
          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title -q '.title' 2>/dev/null || echo "")
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body' 2>/dev/null || echo "")
          PR_DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null | head -500 || echo "")
          PR_FILES=$(gh pr view "$PR_NUMBER" --json files -q '.files[].path' 2>/dev/null || echo "")

          if [ -n "$PR_TITLE" ]; then
            CONTEXT=$(printf '## PR #%s%s %s\n\n%s\n\n### 変更ファイル一覧%s\n%s\n\n### 差分（先頭500行）%s\n```diff\n%s\n```' "$PR_NUMBER" ":" "$PR_TITLE" "$PR_BODY" ":" "$PR_FILES" ":" "$PR_DIFF")
          fi
        elif [ -n "$ISSUE_NUMBER" ] && [ -n "$GH_TOKEN" ]; then
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title' 2>/dev/null || echo "")
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body' 2>/dev/null || echo "")

          if [ -n "$ISSUE_TITLE" ]; then
            CONTEXT=$(printf '## Issue #%s%s %s\n\n%s' "$ISSUE_NUMBER" ":" "$ISSUE_TITLE" "$ISSUE_BODY")
          fi
        fi

        # プロンプトからブラケットトークンを削除
        # 既知のコマンドパターンのみ明示的に削除（Markdown リンク [text](url) やチェックリスト [x] を壊さない）
        # モデル名のショートカット（[gpt-5.3-codex] 等）はプロンプトに残っても動作に影響なし
        # （モデル解決は JavaScript ステップの knownModels で行われる）
        CLEANED_PROMPT=$(printf '%s' "$ORIGINAL_PROMPT" | sed -E '
          s/\[@?(claude|codex)\]//g;
          s/\[model=[^]]+\]//g;
          s/\[(turns|max-turns)=[0-9]+\]//g;
        ')

        # コンテキスト付きプロンプトを構築
        FULL_PROMPT=""
        if [ -n "$CONTEXT" ]; then
          FULL_PROMPT=$(printf '%s\n\n---\n\n%s' "$CONTEXT" "$CLEANED_PROMPT")
        else
          FULL_PROMPT="${CLEANED_PROMPT}"
        fi

        # auto_commit 時: コミットメッセージ生成指示を追加
        if [ "$AUTO_COMMIT" = "true" ]; then
          FULL_PROMPT=$(printf '%s\n\n---\n【コミットについて】\nコード変更を行った場合は、変更の概要を `.codex-commit-msg` ファイルに書き出してください（1行目%s タイトル、2行目以降%s 詳細）。\nConventional Commits 形式（例%s feat%s xxx, fix%s xxx）で記述してください。' "$FULL_PROMPT" ":" ":" ":" ":" ":")
        fi

        # 作業サマリー指示を追加
        FULL_PROMPT=$(printf '%s\n\n---\n【サマリー出力】\n作業完了後、結果のサマリーを `.codex-summary.md` に Markdown 形式で書き出してください。' "$FULL_PROMPT")

        EOF_MARKER="EOF_CONTEXT_$(date +%s%N)"
        echo "prompt<<${EOF_MARKER}" >> $GITHUB_OUTPUT
        echo "$FULL_PROMPT" >> $GITHUB_OUTPUT
        echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

    # 5. 進捗コメントの投稿
    - name: Post progress comment
      if: inputs.issue_number != '' && steps.gh_token.outputs.available == 'true'
      id: progress
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app_token.outputs.token || inputs.bot_github_token || inputs.github_token }}
        GH_REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        MODEL: ${{ steps.codex_opts.outputs.model }}
        HEAD_REF: ${{ inputs.head_ref }}
      run: |
        # GH_TOKEN の確認
        if [ -z "$GH_TOKEN" ]; then
          echo "::warning::GH_TOKEN が空のため、コメント投稿をスキップします"
          exit 0
        fi

        MODEL_INFO=""
        if [ -n "$MODEL" ]; then
          MODEL_INFO=" (model: \`${MODEL}\`)"
        fi

        BRANCH_INFO=""
        BRANCH="${HEAD_REF}"
        if [ -n "$BRANCH" ]; then
          BRANCH_INFO=" • [\`${BRANCH}\`](https://github.com/$GITHUB_REPOSITORY/tree/${BRANCH})"
        fi

        COMMENT_BODY=$(printf '🤖 **Codex が作業を開始しました**%s%s\n\n⏳ 処理中...' "$MODEL_INFO" "$BRANCH_INFO")

        COMMENT_BODY_FILE=$(mktemp)
        echo "$COMMENT_BODY" > "$COMMENT_BODY_FILE"

        # コメント投稿を試行し、失敗時はエラーログを出力
        # GH_REPO で明示的にリポジトリを指定（Fork PR の URL rewriting の影響を回避）
        if COMMENT_URL=$(gh issue comment "$ISSUE_NUMBER" --body-file "$COMMENT_BODY_FILE" 2>&1); then
          echo "コメント投稿成功: $COMMENT_URL"
        else
          echo "::warning::コメント投稿に失敗しました: $COMMENT_URL"
          rm -f "$COMMENT_BODY_FILE"
          exit 0
        fi
        rm -f "$COMMENT_BODY_FILE"

        # コメントIDを保存（後で更新するため）
        if [ -n "$COMMENT_URL" ]; then
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -oP '#issuecomment-\K\d+' || echo "")
          echo "comment_id=${COMMENT_ID}" >> $GITHUB_OUTPUT
          echo "comment_url=${COMMENT_URL}" >> $GITHUB_OUTPUT
        fi

    # 6. Codex のセットアップ
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Codex CLI
      shell: bash
      run: |
        npm install -g @openai/codex@latest

    # 7. 認証設定
    - name: Setup Codex authentication
      id: auth
      shell: bash
      env:
        CODEX_TOKEN: ${{ inputs.codex_code_oauth_token }}
        CODEX_AUTH_JSON: ${{ inputs.codex_auth_json }}
      run: |
        AUTH_DIR="$HOME/.codex"
        mkdir -p "$AUTH_DIR"
        rm -f "$AUTH_DIR/auth.json"

        if [ -n "$CODEX_AUTH_JSON" ]; then
          # Base64 デコードして auth.json を配置
          AUTH_TMP=$(mktemp)
          if ! printf '%s' "$CODEX_AUTH_JSON" | base64 --decode > "$AUTH_TMP" 2>/dev/null \
            && ! printf '%s' "$CODEX_AUTH_JSON" | base64 -d > "$AUTH_TMP" 2>/dev/null \
            && ! printf '%s' "$CODEX_AUTH_JSON" | base64 -D > "$AUTH_TMP" 2>/dev/null; then
            rm -f "$AUTH_TMP"
            echo "::error::codex_auth_json の Base64 デコードに失敗しました"
            exit 1
          fi
          mv "$AUTH_TMP" "$AUTH_DIR/auth.json"
          chmod 600 "$AUTH_DIR/auth.json"
          echo "auth_method=auth_json" >> $GITHUB_OUTPUT
          echo "Codex 認証: auth.json を使用"
        elif [ -n "$CODEX_TOKEN" ]; then
          echo "auth_method=api_key" >> $GITHUB_OUTPUT
          echo "Codex 認証: API キーを使用"
        fi

    # 8. Codex CLI で実行
    # 参考: https://developers.openai.com/codex/cli/reference
    - name: Run Codex
      id: codex_run
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.codex_code_oauth_token }}
        GH_TOKEN: ${{ steps.app_token.outputs.token || inputs.bot_github_token || inputs.github_token }}
        CODEX_PROMPT: ${{ steps.context.outputs.prompt }}
        CODEX_MODEL: ${{ steps.codex_opts.outputs.model }}
        FAIL_ON_ERROR: ${{ inputs.fail_on_error }}
      run: |
        # codex exec: CI/スクリプト向け非対話モード
        # 参考: https://developers.openai.com/codex/cli/reference/
        #       https://developers.openai.com/codex/noninteractive/
        CODEX_ARGS=(exec --color never --ephemeral)

        # CI では承認待ちで止まらないように --yolo を使用
        # --yolo は --dangerously-bypass-approvals-and-sandbox のショートカット
        # 隔離された CI 環境でのみ使用すること
        CODEX_ARGS+=(--yolo)

        # モデル指定
        if [ -n "$CODEX_MODEL" ]; then
          CODEX_ARGS+=(--model "$CODEX_MODEL")
        fi

        # 最終メッセージをファイルに出力（フォールバック用）
        CODEX_ARGS+=(--output-last-message .codex-last-message.md)

        echo "::group::Codex 実行"
        echo "モデル: ${CODEX_MODEL:-default}"
        echo "コマンド: codex ${CODEX_ARGS[*]} <prompt>"
        echo "::endgroup::"

        # Codex 実行（exec サブコマンド、プロンプトを引数で渡す）
        set +e
        codex "${CODEX_ARGS[@]}" "$CODEX_PROMPT" 2>&1 | tee .codex-output.log
        CODEX_EXIT_CODE=${PIPESTATUS[0]}
        set -e

        echo "exit_code=${CODEX_EXIT_CODE}" >> $GITHUB_OUTPUT

        if [ $CODEX_EXIT_CODE -ne 0 ]; then
          echo "::warning::Codex がエラーコード ${CODEX_EXIT_CODE} で終了しました"
          if [ "$FAIL_ON_ERROR" = "true" ]; then
            exit $CODEX_EXIT_CODE
          fi
        fi

    # 9. Codex 出力の読み込み
    - name: Read Codex output
      id: codex_output
      shell: bash
      run: |
        RESPONSE=""
        if [ -f .codex-summary.md ]; then
          # モデルがプロンプト指示に従って生成したサマリーを優先
          RESPONSE=$(cat .codex-summary.md)
        elif [ -f .codex-last-message.md ]; then
          # CLI の --output-last-message で出力された最終メッセージをフォールバック
          RESPONSE=$(cat .codex-last-message.md)
        elif [ -f .codex-output.log ]; then
          # どちらもない場合はログの末尾を使用
          RESPONSE=$(tail -100 .codex-output.log)
        fi

        EOF_MARKER="EOF_RESPONSE_$(date +%s%N)"
        echo "response<<${EOF_MARKER}" >> $GITHUB_OUTPUT
        echo "$RESPONSE" >> $GITHUB_OUTPUT
        echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

    # 10. Codex 作業用ファイルのクリーンアップ
    - name: Cleanup Codex work files
      shell: bash
      env:
        CODEX_DIR_PRE_EXISTS: ${{ steps.codex_dir.outputs.pre_exists }}
      run: |
        # 実行前に存在しなかったのに、実行後にできた場合のみ削除
        if [ "$CODEX_DIR_PRE_EXISTS" = "false" ] && [ -d .codex ]; then
          rm -rf .codex
          echo ".codex/ ディレクトリを削除しました（Codex が作成した一時ディレクトリ）"
        fi

    # 11. コード変更のコミット・プッシュ
    # ブランチ作成は差分がある場合のみ実行（不要なブランチを作らない）
    - name: Commit and push changes
      if: inputs.auto_commit == 'true'
      id: commit
      shell: bash
      env:
        HEAD_REF: ${{ inputs.head_ref }}
        CREATE_BRANCH: ${{ inputs.create_branch }}
        BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        BOT_LOGIN: ${{ inputs.git_user_name }}
        GIT_EMAIL: ${{ steps.git_user.outputs.git_email }}
        PUSH_TOKEN: ${{ steps.app_token.outputs.token || inputs.bot_github_token }}
      run: |
        # 変更があるか確認
        if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
          echo "変更なし。コミットをスキップします。"
          echo "has_changes=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "has_changes=true" >> $GITHUB_OUTPUT

        # 変更ファイル一覧をログ出力（想定外のファイルの確認用）
        echo "::group::変更ファイル一覧"
        git diff --name-only
        git ls-files --others --exclude-standard
        echo "::endgroup::"

        # 差分がある場合のみブランチを作成（Issue 起点の実装時）
        BRANCH_NAME=""
        if [ "$CREATE_BRANCH" = "true" ] && [ -n "$ISSUE_NUMBER" ]; then
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="${BRANCH_PREFIX}issue-${ISSUE_NUMBER}-${TIMESTAMP}"
          git checkout -b "$BRANCH_NAME"
          echo "ブランチ作成: ${BRANCH_NAME}"
        fi
        echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

        # コミットメッセージの読み込み
        COMMIT_MSG="feat: Codex による自動実装"
        if [ -f .codex-commit-msg ]; then
          COMMIT_MSG=$(cat .codex-commit-msg)
        fi

        # 一時ファイルを除外してステージング
        git add -A
        git reset -- .codex-output.log .codex-commit-msg .codex-summary.md .codex-last-message.md .codex-issues.json 2>/dev/null || true

        # コミット（Bot ユーザーの正しいメールで Co-authored-by を設定）
        COMMIT_FULL_MSG=$(printf '%s\n\nCo-authored-by%s %s <%s>' "$COMMIT_MSG" ":" "$BOT_LOGIN" "$GIT_EMAIL")
        git commit -m "$COMMIT_FULL_MSG" || {
          echo "コミットに失敗しました（変更なしの可能性）"
          echo "has_changes=false" >> $GITHUB_OUTPUT
          exit 0
        }

        # push 認証の差し替え
        # GITHUB_TOKEN で push すると後続ワークフロー（レビュー等）がトリガーされない（GitHub の仕様）
        # App トークンまたは bot_github_token が利用可能な場合、push 時の認証を差し替える
        if [ -n "$PUSH_TOKEN" ]; then
          echo "::add-mask::${PUSH_TOKEN}"
          AUTH_BASE64=$(printf '%s' "x-access-token:${PUSH_TOKEN}" | base64 | tr -d '\n')
          echo "::add-mask::${AUTH_BASE64}"
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${AUTH_BASE64}"
          echo "push 認証を差し替えました（後続ワークフローのトリガーが有効化されます）"
        fi

        # プッシュ
        BRANCH="${BRANCH_NAME:-$HEAD_REF}"
        if [ -n "$BRANCH" ]; then
          git push origin "$BRANCH"
        else
          git push origin HEAD
        fi

    # 13. auth.json のクリーンアップ
    - name: Cleanup auth.json
      if: always() && steps.auth.outputs.auth_method == 'auth_json'
      shell: bash
      run: |
        rm -f "$HOME/.codex/auth.json"
        echo "auth.json をクリーンアップしました"

    # 14. 結果コメントの更新（成功時）
    - name: Update result comment (success)
      if: inputs.issue_number != '' && steps.gh_token.outputs.available == 'true' && steps.codex_run.outputs.exit_code == '0'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app_token.outputs.token || inputs.bot_github_token || inputs.github_token }}
        GH_REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        CODEX_RESPONSE: ${{ steps.codex_output.outputs.response }}
        BRANCH_NAME: ${{ steps.commit.outputs.branch_name }}
        HEAD_REF: ${{ inputs.head_ref }}
        HAS_CHANGES: ${{ steps.commit.outputs.has_changes }}
        COMMENT_ID: ${{ steps.progress.outputs.comment_id }}
        AUTO_COMMIT: ${{ inputs.auto_commit }}
      run: |
        BRANCH="${BRANCH_NAME:-$HEAD_REF}"
        BRANCH_INFO=""
        if [ -n "$BRANCH" ]; then
          BRANCH_INFO=" • [\`${BRANCH}\`](https://github.com/$GITHUB_REPOSITORY/tree/${BRANCH})"
        fi

        CHANGES_INFO=""
        if [ "$AUTO_COMMIT" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
          CHANGES_INFO=$(printf '\n✅ コード変更をコミット・プッシュしました。')
        elif [ "$AUTO_COMMIT" = "true" ]; then
          CHANGES_INFO=$(printf '\nℹ️ コード変更はありませんでした。')
        fi

        COMMENT_BODY=$(printf '🤖 **Codex が作業を完了しました**%s\n%s\n\n---\n%s' "$BRANCH_INFO" "$CHANGES_INFO" "$CODEX_RESPONSE")

        # GitHub コメントは 65,536 文字制限があるため truncate する
        # https://github.com/orgs/community/discussions/27190
        MAX_COMMENT_LENGTH=60000
        if [ ${#COMMENT_BODY} -gt $MAX_COMMENT_LENGTH ]; then
          TRUNCATE_MSG=$(printf '\n\n---\n⚠️ コメントが長すぎるため切り詰めました。完全なログは [workflow run](https://github.com/%s/actions/runs/%s) を参照してください。' "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
          COMMENT_BODY="${COMMENT_BODY:0:$MAX_COMMENT_LENGTH}${TRUNCATE_MSG}"
        fi

        COMMENT_BODY_FILE=$(mktemp)
        echo "$COMMENT_BODY" > "$COMMENT_BODY_FILE"

        if [ -n "$COMMENT_ID" ]; then
          # 既存コメントを更新
          gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" -X PATCH -f body="$(cat "$COMMENT_BODY_FILE")" 2>/dev/null || \
            gh issue comment "$ISSUE_NUMBER" --body-file "$COMMENT_BODY_FILE" 2>/dev/null || true
        else
          gh issue comment "$ISSUE_NUMBER" --body-file "$COMMENT_BODY_FILE" 2>/dev/null || true
        fi

        rm -f "$COMMENT_BODY_FILE"

    # 15. エラー時のコメント更新
    - name: Update result comment (error)
      if: inputs.issue_number != '' && steps.gh_token.outputs.available == 'true' && steps.codex_run.outputs.exit_code != '0' && steps.codex_run.outputs.exit_code != ''
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app_token.outputs.token || inputs.bot_github_token || inputs.github_token }}
        GH_REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        EXIT_CODE: ${{ steps.codex_run.outputs.exit_code }}
        COMMENT_ID: ${{ steps.progress.outputs.comment_id }}
      run: |
        ERROR_LOG=""
        if [ -f .codex-output.log ]; then
          ERROR_LOG=$(tail -50 .codex-output.log)
        fi

        COMMENT_BODY=$(printf '❌ **Codex がエラーで終了しました**（終了コード%s %s）\n\n```\n%s\n```' ":" "$EXIT_CODE" "$ERROR_LOG")

        # GitHub コメントは 65,536 文字制限があるため truncate する
        MAX_COMMENT_LENGTH=60000
        if [ ${#COMMENT_BODY} -gt $MAX_COMMENT_LENGTH ]; then
          TRUNCATE_MSG=$(printf '\n\n---\n⚠️ コメントが長すぎるため切り詰めました。完全なログは [workflow run](https://github.com/%s/actions/runs/%s) を参照してください。' "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
          COMMENT_BODY="${COMMENT_BODY:0:$MAX_COMMENT_LENGTH}${TRUNCATE_MSG}"
        fi

        COMMENT_BODY_FILE=$(mktemp)
        echo "$COMMENT_BODY" > "$COMMENT_BODY_FILE"

        if [ -n "$COMMENT_ID" ]; then
          gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" -X PATCH -f body="$(cat "$COMMENT_BODY_FILE")" 2>/dev/null || \
            gh issue comment "$ISSUE_NUMBER" --body-file "$COMMENT_BODY_FILE" 2>/dev/null || true
        else
          gh issue comment "$ISSUE_NUMBER" --body-file "$COMMENT_BODY_FILE" 2>/dev/null || true
        fi

        rm -f "$COMMENT_BODY_FILE"

    # 16. 一時ファイルのクリーンアップ（コメント投稿後に実行）
    - name: Cleanup temp files
      if: always()
      shell: bash
      run: |
        rm -f .codex-output.log .codex-commit-msg .codex-summary.md .codex-last-message.md
